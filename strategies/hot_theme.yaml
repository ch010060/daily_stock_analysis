# Hot Theme Strategy / 熱點題材

name: hot_theme
display_name: 熱點題材
description: 跟蹤政策、產業和市場熱點，判斷題材強度、板塊擴散和個股相對強弱。
category: framework
core_rules: [2, 3, 5, 7]
required_tools:
  - get_sector_rankings
  - search_stock_news
  - get_realtime_quote
  - analyze_trend
aliases: [熱點, 題材, 熱點題材]
default_priority: 35
market_regimes: [sector_hot]

instructions: |
  **熱點題材策略（Hot Theme Strategy）**

  適用場景：
  - 市場出現明確政策、產業、技術路線或資金抱團熱點。
  - 需要判斷個股是否真正受益於熱點，而不是單純蹭概念。

  分析框架：

  1. **熱點強度**
     - 使用 `get_sector_rankings` 判斷相關板塊是否在近期漲幅、成交額或人氣上處於前列。
     - 觀察熱點是否從少數核心股擴散到板塊內多隻個股。
     - 若只有單股異動、板塊未共振，降低訊號權重。

  2. **個股相關性**
     - 使用 `search_stock_news` 檢查公司業務、訂單、產能、客戶、公告是否與熱點直接相關。
     - 區分“實質受益”“間接受益”“概念關聯較弱”。
     - 概念關聯弱但漲幅過大時，應提示題材兌現風險。

  3. **相對強弱**
     - 使用 `get_realtime_quote` 與 `analyze_trend` 判斷個股漲幅、量比、換手率是否強於板塊平均。
     - 強勢熱點股通常表現為放量、換手活躍、回撥不破關鍵均線。

  4. **節奏與風險**
     - 不在連續加速、高乖離率位置追漲。
     - 若新聞集中在“已經大漲”“資金追捧”“龍虎榜遊資博弈”，需要警惕短線情緒頂。
     - 重大利空、監管問詢、澄清公告可一票降低評級。

  輸出要求：
  - 明確當前熱點階段：啟動 / 擴散 / 分化 / 退潮。
  - 說明個股與熱點的實質相關性。
  - 給出可執行觸發條件：回踩承接、放量突破、板塊繼續共振或退潮止損。

  評分調整建議：
  - 熱點處於啟動或擴散期，且個股實質受益：`sentiment_score +12`
  - 個股強於板塊並有量能確認：額外 `+6`
  - 熱點進入分化或退潮：`sentiment_score -8`
  - 僅概念蹭熱點且乖離率過高：`sentiment_score -12`

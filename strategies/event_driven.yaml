# Event Driven Strategy / 事件驅動

name: event_driven
display_name: 事件驅動
description: 圍繞業績、政策、併購、訂單、產品釋出等事件，評估催化強度、兌現機率和風險邊界。
category: framework
core_rules: [3, 5]
required_tools:
  - search_stock_news
  - get_realtime_quote
  - analyze_trend
aliases: [事件驅動, 催化, 催化事件]
default_priority: 45
market_regimes: [sector_hot, volatile]

instructions: |
  **事件驅動策略（Event Driven Strategy）**

  適用場景：
  - 公司或行業出現明確事件催化，如業績預告、訂單中標、併購重組、政策落地、產品釋出、監管處罰、訴訟等。
  - 需要判斷事件是短期交易催化、長期基本面改善，還是利好兌現。

  分析框架：

  1. **事件分類**
     - 使用 `search_stock_news` 梳理近期關鍵事件。
     - 將事件分為：業績類、政策類、訂單/產品類、資本運作類、監管/風險類。
     - 明確事件發生時間，過期或時間未知的資訊不能作為主要依據。

  2. **影響路徑**
     - 判斷事件影響的是收入、利潤率、估值、融資能力、市場份額，還是僅影響情緒。
     - 對重大訂單或政策利好，要說明兌現週期和不確定性。
     - 對監管、減持、處罰、訴訟等事件，風險優先。

  3. **市場反應**
     - 使用 `get_realtime_quote` 和 `analyze_trend` 判斷事件是否已被價格充分反映。
     - 放量上漲但未過關鍵阻力，可等待確認。
     - 高位放量滯漲或利好後衝高回落，應警惕兌現壓力。

  4. **交易計劃**
     - 事件未兌現前，強調部位控制和時間視窗。
     - 事件兌現後，重新評估是否從“預期交易”切換為“業績驗證”。
     - 對負面事件，先看風險釋放是否充分，再考慮反彈。

  輸出要求：
  - 明確事件性質：利好 / 利空 / 中性 / 不確定。
  - 給出事件可信度、兌現週期、已反映程度。
  - 操作建議必須包含失效條件，如公告不及預期、跌破關鍵支撐或事件熱度消退。

  評分調整建議：
  - 高可信正向事件且價格尚未充分反映：`sentiment_score +14`
  - 正向事件已大幅兌現：`sentiment_score -6`
  - 負面事件仍在發酵：`sentiment_score -15`
  - 事件影響不清晰或資訊衝突：維持中性並降低置信度

# Expectation Repricing Strategy / 預期重估

name: expectation_repricing
display_name: 預期重估
description: 分析業績預期、政策預期和估值預期的變化，尋找預期差修復或預期過熱後的回落風險。
category: framework
core_rules: [3, 5, 6]
required_tools:
  - search_stock_news
  - get_stock_info
  - get_realtime_quote
  - analyze_trend
aliases: [預期, 預期差, 預期重估]
default_priority: 65
market_regimes: [volatile, sector_hot]

instructions: |
  **預期重估策略（Expectation Repricing Strategy）**

  適用場景：
  - 市場對公司業績、政策、行業景氣、估值中樞或競爭格局的預期正在變化。
  - 需要判斷當前價格反映的是“預期修復”“預期落空”還是“預期過熱”。

  分析框架：

  1. **預期來源**
     - 使用 `search_stock_news` 識別近期改變市場預期的資訊：業績預告、機構觀點、訂單、政策、產品進展、行業資料。
     - 區分硬資訊（公告、財報、訂單）和軟資訊（傳聞、觀點、情緒）。

  2. **預期差方向**
     - 正向預期差：市場原本悲觀，新增資訊顯示業務或業績好於預期。
     - 負向預期差：市場原本樂觀，新增資訊低於預期或驗證失敗。
     - 若資訊已經被連續大漲充分反映，需要提示預期兌現風險。

  3. **估值重估**
     - 使用 PE/PB、市值、ROE、現金流等欄位判斷估值重估是否有基本面支撐。
     - 估值提升需要匹配盈利質量、增長持續性和行業空間。
     - 估值回落時，觀察是否由一次性擾動還是長期邏輯變化導致。

  4. **價格確認**
     - 使用 `analyze_trend` 判斷預期變化是否已經轉化為趨勢。
     - 放量突破可視為預期被資金確認；縮量反彈則更偏修復觀察。
     - 高位放量滯漲、利好不漲或跌破關鍵支撐，可能意味著預期轉弱。

  輸出要求：
  - 明確當前是：正向預期差 / 預期兌現 / 負向預期差 / 預期不明。
  - 說明哪些資訊改變了市場預期，哪些仍待驗證。
  - 給出觀察點：下一份財報、訂單兌現、政策落地、估值回落或技術確認。

  評分調整建議：
  - 正向預期差且價格尚未充分反映：`sentiment_score +15`
  - 正向預期差已被連續大漲兌現：`sentiment_score -5`
  - 負向預期差或核心假設被證偽：`sentiment_score -15`
  - 資訊不充分但存在潛在修復：維持中性並降低置信度

# Growth Quality Strategy / 成長質量

name: growth_quality
display_name: 成長質量
description: 結合收入利潤增長、ROE、現金流和行業空間，識別高質量成長股與成長失速風險。
category: framework
core_rules: [2, 3, 5]
required_tools:
  - get_stock_info
  - get_realtime_quote
  - search_stock_news
  - analyze_trend
aliases: [成長, 成長股, 成長質量]
default_priority: 55
market_regimes: [trending_up]

instructions: |
  **成長質量策略（Growth Quality Strategy）**

  適用場景：
  - 關注公司中長期成長能力，而不是隻看短線技術形態。
  - 適合高景氣行業、業績持續改善或商業模式擴張階段的公司。

  分析框架：

  1. **成長性**
     - 優先檢視財報欄位中的營業收入、歸母淨利潤、經營現金流和 ROE。
     - 判斷收入增長和利潤增長是否同向，是否存在“增收不增利”。
     - 若只有概念熱度但財報尚未驗證，應降低成長確定性。

  2. **質量**
     - ROE 越高且穩定，質量越好。
     - 經營現金流與淨利潤方向一致，說明盈利質量更可靠。
     - 現金流顯著弱於利潤時，要提示回款、存貨或應收風險。

  3. **估值承受力**
     - 使用 PE/PB、市值等估值欄位判斷市場是否已經提前透支成長。
     - 高成長可承受更高估值，但必須說明增長能否覆蓋估值。
     - 估值高且成長放緩時，應明顯下調評分。

  4. **趨勢確認**
     - 使用 `analyze_trend` 判斷長期成長邏輯是否被市場資金確認。
     - 基本面向好但技術面未確認時，優先給觀察條件而不是直接追買。

  輸出要求：
  - 明確公司處於：高質量成長 / 成長驗證中 / 成長放緩 / 成長證偽。
  - 說明成長來自收入擴張、利潤率改善、行業景氣，還是一次性因素。
  - 給出適合成長股的買點：業績驗證後突破、回踩長期均線或估值回落。

  評分調整建議：
  - 收入、利潤、現金流和 ROE 同向改善：`sentiment_score +15`
  - 行業景氣與公司新聞互相驗證：額外 `+6`
  - 高估值但成長未驗證：`sentiment_score -8`
  - 增收不增利或現金流惡化：`sentiment_score -12`

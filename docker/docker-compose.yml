# ===================================
# A股自選股智慧分析系統 - Docker Compose
# ===================================
# 
# 使用方式:
#   定時模式: docker-compose -f ./docker/docker-compose.yml up -d
#   FastAPI模式: docker-compose -f ./docker/docker-compose.yml up -d server
#   同時啟動: docker-compose -f ./docker/docker-compose.yml up -d analyzer server

name: daily-stock-analysis
version: '3.8'

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped

  # 環境變數（從 .env 檔案載入）。不要將 ../.env 作為單檔案 volume 掛載到 /app/.env，
  # 否則 Docker mount point 會阻止配置儲存時的 os.replace 原子更新。
  env_file:
    - ../.env

  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../strategies:/app/strategies:ro
    # Longbridge OAuth token cache persistence; entrypoint repairs container-side ownership for dsa user.
    # Create ../longbridge_tokens on the host before copying an authorized token cache into it.
    - ../longbridge_tokens:/home/dsa/.longbridge
    # 如需覆蓋前端靜態資源，可掛載本地 static 目錄
    # - ../static:/app/static:ro

  environment:
    - TZ=Asia/Shanghai

    # Local-safe server profile binds API/WebUI to loopback only.
    # Public container serving remains deferred for this profile.
    - WEBUI_HOST=127.0.0.1
    # API_PORT 從 .env 檔案讀取，無需在此硬編碼

    # 代理設定（如果需要）
    # - http_proxy=http://host.docker.internal:10809
    # - https_proxy=http://host.docker.internal:10809
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  # 資源限制
  deploy:
    resources:
      limits:
        memory: 512M
      reservations:
        memory: 256M

services:
  # 定時任務模式
  analyzer:
    <<: *common
    container_name: stock-analyzer

  # FastAPI 模式
  server:
    <<: *common
    container_name: stock-server
    command: ["python", "main.py", "--serve-only", "--host", "127.0.0.1", "--port", "${API_PORT:-8000}"]
    # 若使用 network_mode: host，則以下 ports 對映無效，埠由 command 中的 --port 指定
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
